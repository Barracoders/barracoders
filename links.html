<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Beachside Barracoders - Links</title>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
  <link rel="stylesheet" href="/styles/links.css" />
  <link
      rel="icon"
      href="images/logos/icon-logo.png"
      type="image/icon type"
    />
</head>
<body>
  <section id="links-hero">
    <div class="logo-container">
      <img id="main-logo" src="/images/logos/coders_white_cropped.png" alt="Club Logo" />
    </div>
    <h1>Beachside Barracoders</h1>
    <p>Connect with us and explore our world of coding!</p>

    <div class="links-container">
      <a href="https://barracoders.com" class="link-btn" target="_blank">
        <i class="fas fa-globe"></i>
        <span>Main Website</span>
      </a>
      <a href="https://www.instagram.com/bhs_barracoders/" class="link-btn" target="_blank">
        <i class="fab fa-instagram"></i>
        <span>Instagram</span>
      </a>
      <a href="https://hcb.hackclub.com/donations/start/beachside-barracoders" class="link-btn" target="_blank">
        <i class="fas fa-heart"></i>
        <span>Support Us on HCB</span>
      </a>
    </div>
  </section>

  <section id="photos-collage">
    <h2>Club Photos</h2>
    <div class="collage-container">
      <!-- Photos will be loaded here -->
    </div>
  </section>

  <footer>
    <p>&copy; 2025 <a href="https://www-bhs.stjohns.k12.fl.us/">Beachside Highschool</a>. Created and Maintained by the Beachside Barracoders. </p>
  </footer>

  <script src="/js/links-collage.js"></script>

</body>
</html>
